services:
  # ── Backend: FastAPI ──────────────────────────────────────────────────────
  - type: web
    name: pointme-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard — never commit the key
      - key: PYTHON_VERSION
        value: "3.11"

  # ── Frontend: Vite static site ────────────────────────────────────────────
  - type: web
    name: pointme
    runtime: static
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false          # set to https://pointme-api.onrender.com after backend deploys
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
